<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BE — Settings</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="main-content">
        <div class="page-content">
            <h2 style="margin-bottom: 1.5rem; text-transform: uppercase;">System Settings</h2>

            <form id="settingsForm">
                <div class="grid-cards" style="grid-template-columns: 1fr 1fr;">
                    
                    <!-- Firm Details -->
                    <div class="form-section" style="margin-bottom: 0;">
                        <h4 style="margin-bottom: 1rem; color: var(--accent-teal);">Firm Details</h4>
                        <div class="form-group" style="margin-bottom: 1rem;">
                            <label>Firm Name</label>
                            <input type="text" id="setFirmName" required>
                        </div>
                        <div class="form-group" style="margin-bottom: 1rem;">
                            <label>GST Number</label>
                            <input type="text" id="setGstNumber">
                        </div>
                        <div class="form-group" style="margin-bottom: 1rem;">
                            <label>Financial Year Start</label>
                            <input type="date" id="setFyStart" required>
                        </div>
                        <div class="form-group">
                            <label>Base Currency</label>
                            <input type="text" id="setCurrency" value="INR">
                        </div>
                    </div>

                    <!-- Tally Config -->
                    <div class="form-section" style="margin-bottom: 0;">
                        <h4 style="margin-bottom: 1rem; color: var(--accent-amber);">Tally Integration</h4>
                        <div class="form-group" style="margin-bottom: 1rem;">
                            <label>Tally Host</label>
                            <input type="text" id="setTallyHost" value="localhost" required>
                        </div>
                        <div class="form-group" style="margin-bottom: 1rem;">
                            <label>Tally HTTP Port</label>
                            <input type="number" id="setTallyPort" value="9000" required>
                        </div>
                        <div style="display: flex; gap: 0.5rem; margin-top: 1.5rem;">
                            <button type="button" class="btn-outline" onclick="testTallyConnection()">TEST CONNECTION</button>
                            <span id="tallyPingStatus" style="font-family: var(--font-data); font-size: 0.8rem; align-self: center;"></span>
                        </div>
                    </div>

                </div>

                <div style="margin-top: 2rem;">
                    <button type="submit" class="btn-teal">SAVE SETTINGS</button>
                    <span id="saveStatus" class="text-teal" style="margin-left: 1rem; font-family: var(--font-data); display: none;">Saved!</span>
                </div>
            </form>

            <div class="form-section" style="margin-top: 2rem;">
                <h4 style="margin-bottom: 1rem;">Security</h4>
                <form id="passwordForm">
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; align-items: flex-end;">
                        <div class="form-group">
                            <label>New Password</label>
                            <input type="password" id="newPassword" required>
                        </div>
                        <div class="form-group">
                            <label>Confirm Password</label>
                            <input type="password" id="confirmPassword" required>
                        </div>
                        <button type="submit" class="btn-outline">UPDATE PASSWORD</button>
                    </div>
                    <div id="passwordStatus" style="font-family: var(--font-data); font-size: 0.8rem; margin-top: 0.5rem;"></div>
                </form>
            </div>

            <!-- User Auth Form - simple ui -->
            <div class="form-section" style="margin-top: 2rem;">
                <h4 style="margin-bottom: 1rem;">Database Backup</h4>
                <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem;">
                    The SQLite database file is located at <code>server/db/be_database.db</code>. Ensure you back this file up regularly.
                </p>
                <!-- For a real web app, we'd add an API endpoint to download the raw .db file. I'll omit it to keep it simple but could add if required. -->
            </div>

        </div>
    </div>

    <script src="js/layout.js"></script>
    <script src="js/settings.js"></script>
</body>
</html>
