<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BE — Income</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="main-content">
        <div class="page-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2 style="text-transform: uppercase;">Income Management</h2>
                <button class="btn-amber" onclick="exportToExcel('income')">EXPORT TO EXCEL</button>
            </div>

            <div class="form-section">
                <form id="incomeForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Date</label>
                            <input type="date" id="incDate" required>
                        </div>
                        <div class="form-group" style="grid-column: span 2;">
                            <label>Description</label>
                            <input type="text" id="incDesc" required>
                        </div>
                        <div class="form-group">
                            <label>Category</label>
                            <select id="incCat" required>
                                <option value="Product Sales">Product Sales</option>
                                <option value="Service Income">Service Income</option>
                                <option value="Raw Material Sales">Raw Material Sales</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Amount (₹)</label>
                            <input type="number" step="0.01" id="incAmt" required>
                        </div>
                        <div class="form-group">
                            <label>GST Rate</label>
                            <select id="incGstRate">
                                <option value="0">0%</option>
                                <option value="5">5%</option>
                                <option value="12">12%</option>
                                <option value="18">18%</option>
                                <option value="28">28%</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Invoice No.</label>
                            <input type="text" id="incInv">
                        </div>
                        <div class="form-group" style="justify-content: flex-end;">
                            <div id="calcPreview"
                                style="font-family: var(--font-data); font-size: 0.8rem; color: var(--accent-teal); margin-bottom: 0.5rem; text-align: right;">
                            </div>
                            <button type="submit" id="incSubmitBtn">ADD INCOME</button>
                            <button type="button" id="incCancelBtn" class="btn-outline"
                                style="display:none; margin-top:0.5rem;" onclick="resetForm()">CANCEL EDIT</button>
                            <input type="hidden" id="editId">
                        </div>
                    </div>
                </form>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Date</th>
                            <th>Description</th>
                            <th>Category</th>
                            <th>Amount</th>
                            <th>GST%</th>
                            <th>GST Amt</th>
                            <th>Total</th>
                            <th>Invoice</th>
                            <th>Sync</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="incomeTableBody">
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <script src="js/layout.js?v=2.0"></script>
    <script src="js/income.js?v=2.0"></script>
</body>

</html>
