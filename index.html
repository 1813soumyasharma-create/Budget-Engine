<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BE — Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-card" id="loginCard">
        <div class="login-brand">BE — BUDGET ENGINE</div>
        <form id="loginForm" class="form-group" style="gap: 1.5rem;">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required autocomplete="current-password">
            </div>
            <div id="errorMsg" class="text-red" style="display:none; font-size: 0.8rem; font-family: var(--font-data);"></div>
            <button type="submit" style="margin-top: 1rem;">ACCESS SYSTEM</button>
        </form>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
